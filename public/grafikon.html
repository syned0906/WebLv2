<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grafikon</title>
  <link rel="stylesheet" href="grafikon_style.css">
</head>
<body>
<header>
		<h1>Filmovi</h1>
</header>
<header>
   		<nav aria-labelledby="primarna-navigacija">
        </nav>
			<nav role="navigation"> <!-- dodati obilježja za ARIA-->
				<ul>
					<li class="dropdown">
						<h2 id="primarna-navigacija" class="nav-toggle">Primarna navigacija</h2>
						<ul class="dropdown-content"> <!-- dodati da je navigacija lijevo poravnata i da je skrivena				
							LV1: bez upotrebe javascripta -->
							<li><a href="index.html">Pocetna</a></li>
							<li><a href="grafikon.html">Grafikon</a></li>
							<li><a href="slike.html">Slike</a></li>
						</ul>
					</li>	
					
				</ul>
			</nav>
</header>

<main>
  <h1>Filmovi po žanru</h1>
  <div class="charts-row">
  <div class="simple-bar-chart">
    <div class="item" style="--val: 32; --clr: var(--drama)">
      <div class="label">Komedija</div>
      <div class="value">34%</div>
    </div>
    <div class="item" style="--val: 26; --clr: var(--komedija)">
      <div class="label">Horor</div>
      <div class="value">16%</div>
    </div>
    
    <div class="item" style="--val: 32; --clr: var(--ostali)">
      <div class="label">Ostali</div>
      <div class="value">30%</div>
    </div>
    <div class="item" style="--val: 10; --clr: var(--akcija)">
      <div class="label">Akcija</div>
      <div class="value">20%</div>
    </div>
  </div>
  <div class="pie-chart-container">
  <div class="pie-chart"></div>
  <div class="legend">
    <div class="legend-item"><span class="color" style="background-color: var(--drama)"></span> Komedija - 34%</div>
    <div class="legend-item"><span class="color" style="background-color: var(--komedija)"></span> Horor - 16%</div>
    <div class="legend-item"><span class="color" style="background-color: var(--ostali)"></span> Ostali - 30%</div>
    <div class="legend-item"><span class="color" style="background-color: var(--akcija)"></span> Akcija - 20%</div>
  </div>
</div>
</div>
</main>
  <footer>
		<p>&copy; 2026. Web Programiranje. Sva prava pridrzana.</p>
</footer>
</body>
</html>
